name: Notify Discord on Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord message
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "$(jq -n \
            --arg repo "${{ github.event.repository.name }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg commit "${{ github.event.head_commit.message }}" \
            --arg author "${{ github.event.head_commit.author.name }}" \
            '{
              content: "<@&1477743270665912350>\n\n✅ Nuovo update del sito\n\n📦 Repo: \($repo)\n🌿 Branch: \($branch)\n📝 Commit: \($commit)\n👤 Autore: \($author)\n🔗 https://aoe4community.vercel.app",
              allowed_mentions: { parse: ["roles"] }
            }'
          )" \
          "${{ secrets.DISCORD_WEBHOOK }}"